name: Appium Android Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
defaults:
  run:
    working-directory: AppiumDemoProject2
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Appium
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2@latest

      - name: Install ChromeDriver
        run: |
          wget -q "https://chromedriver.storage.googleapis.com/74.0.3729.6/chromedriver_linux64.zip"
          unzip chromedriver_linux64.zip
          sudo mv chromedriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      - name: Override env to ci
        run: |
          mkdir -p src/test/resources
          python3 -c "
          import os
          path = 'src/test/resources/config.properties'
          if os.path.exists(path):
              with open(path, 'r') as f:
                  content = f.read()
              content = content.replace('env=local', 'env=ci')
              with open(path, 'w') as f:
                  f.write(content)
          else:
              with open(path, 'w') as f:
                  f.write('url=https://www.saucedemo.com\n')
                  f.write('username=standard_user\n')
                  f.write('password=secret_sauce\n')
                  f.write('env=ci\n')
          with open(path, 'r') as f:
              print(f.read())
          "

      - name: Start Emulator and Run Tests
        uses: reactivecircus/android-emulator-runner@v2
        continue-on-error: true
        env:
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 1
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          profile: pixel_5
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            appium --allow-insecure uiautomator2:chromedriver_autodownload --relaxed-security &
            sleep 15
            mvn clean test -f /home/runner/work/Appium_Sauce_Demo_Project/Appium_Sauce_Demo_Project/AppiumDemoProject2/pom.xml || cat /home/runner/work/Appium_Sauce_Demo_Project/Appium_Sauce_Demo_Project/AppiumDemoProject2/target/surefire-reports/*.txt
            
