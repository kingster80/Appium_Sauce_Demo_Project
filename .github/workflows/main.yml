name: Appium Android Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  test:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install Appium
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2@latest
      - name: Override env to ci
        run: |
          mkdir -p src/test/resources
          python3 -c "
          import os
          path = 'src/test/resources/config.properties'
          if os.path.exists(path):
              with open(path, 'r') as f:
                  content = f.read()
              content = content.replace('env=local', 'env=ci')
              with open(path, 'w') as f:
                  f.write(content)
          else:
              with open(path, 'w') as f:
                  f.write('url=https://www.saucedemo.com\n')
                  f.write('username=standard_user\n')
                  f.write('password=secret_sauce\n')
                  f.write('env=ci\n')
          with open(path, 'r') as f:
              print(f.read())
          "
      - name: Start Emulator and Run Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: pixel_5
          script: |
            appium --allow-insecure chromedriver_autodownload &
            sleep 15
            mvn clean test
