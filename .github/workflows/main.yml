name: Appium Android Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install Appium
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2@latest
      - name: Override env to ci
        run: |
          echo ">>> Current directory:"
          pwd
          mkdir -p src/test/resources
          if [ -f src/test/resources/config.properties ]; then
            sed -i 's/env=local/env=ci/' src/test/resources/config.properties
          else
            echo "url=https://www.saucedemo.com" > src/test/resources/config.properties
            echo "username=standard_user" >> src/test/resources/config.properties
            echo "password=secret_sauce" >> src/test/resources/config.properties
            echo "env=ci" >> src/test/resources/config.properties
          fi
          echo ">>> Config file contents:"
          cat src/test/resources/config.properties
      - name: Start Emulator and Run Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 13
          target: google_apis
          arch: x86_64
          profile: pixel_5
          script: |
            appium --allow-insecure chromedriver_autodownload &
            sleep 10
            mvn clean test
